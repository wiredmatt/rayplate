name: Build

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: ['**']

jobs:
  format:
    name: Check C formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check formatting
        run: clang-format --dry-run --Werror src/*.c src/*.h

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y build-essential cmake git libgl1-mesa-dev libwayland-bin libwayland-dev libx11-dev libxcursor-dev libxext-dev libxi-dev libxinerama-dev libxrandr-dev libxkbcommon-dev mesa-vulkan-drivers pkg-config xauth xdotool xvfb
            cmake_args: -DGAME_ANGLE_PROVIDER=DOWNLOAD
          - os: macos-latest
            install_deps: ''
            cmake_args: -DGAME_ANGLE_PROVIDER=DOWNLOAD
          - os: windows-latest
            install_deps: ''
            cmake_args: -DGAME_ANGLE_PROVIDER=DOWNLOAD

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        if: matrix.install_deps != ''
        run: ${{ matrix.install_deps }}

      - name: Configure CMake
        run: cmake -B build ${{ matrix.cmake_args }} -DGAME_WARNINGS_AS_ERRORS=ON -DRL_ALIAS_MODE="INLINE" -DRAYLIB_ALIAS_PREFIX="RLIB_" -DRLGL_ALIAS_PREFIX="RLGL_"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Verify Linux resolves rlgl through ANGLE
        if: runner.os == 'Linux'
        run: |
          readelf -d build/my_game | grep 'Shared library: \[libGLESv2.so\]'
          test -f build/libvulkan.so.1
          test -f build/assets/images/raylib_logo.png

      - name: Smoke test Linux ANGLE backends
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for api in opengl vulkan; do
            set +e
            timeout 20s xvfb-run -a bash -euo pipefail -c '
              api="$1"
              stdbuf -oL -eL build/my_game --graphics-api="$api" >"$api.log" 2>&1 &
              app_pid=$!
              window_id=""

              for attempt in {1..100}; do
                mapfile -t window_ids < <(
                  xdotool search --onlyvisible --pid "$app_pid" 2>/dev/null
                )
                if (( ${#window_ids[@]} > 0 )); then
                  window_id="${window_ids[0]}"
                  break
                fi
                if ! kill -0 "$app_pid" 2>/dev/null; then
                  wait "$app_pid"
                  exit 3
                fi
                sleep 0.1
              done

              if [[ -z "$window_id" ]]; then
                echo "Timed out waiting for a visible window from PID $app_pid" >&2
                kill "$app_pid" 2>/dev/null || true
                wait "$app_pid" 2>/dev/null || true
                exit 2
              fi

              xdotool keydown --window "$window_id" Escape
              wait "$app_pid"
            ' _ "$api"
            status=$?
            set -e
            cat "$api.log"
            if [[ "$status" -ne 0 ]]; then
              exit 1
            fi
            grep 'DISPLAY: Device initialized successfully' "$api.log"
            grep "ANGLE: Requested backend:" "$api.log"
            grep 'Window closed successfully' "$api.log"
          done

      - name: Verify macOS resolves rlgl through ANGLE
        if: runner.os == 'macOS'
        run: |
          app=build/my_game.app
          executable="$app/Contents/MacOS/my_game"
          test -x "$executable"
          test -f "$app/Contents/Frameworks/libEGL.dylib"
          test -f "$app/Contents/Frameworks/libGLESv2.dylib"
          test -f "$app/Contents/Resources/angle-licenses/manifest.json"
          otool -L "$executable" | \
            grep '@executable_path/../Frameworks/libGLESv2.dylib'
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign --display --verbose=4 "$app" 2>&1 | grep 'Signature=adhoc'
          "$executable" --help

      - name: Package macOS application bundle
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/my_game.app build/my_game-macos.zip
          rm -rf build/package-check
          mkdir -p build/package-check
          ditto -x -k build/my_game-macos.zip build/package-check
          test -x build/package-check/my_game.app/Contents/MacOS/my_game
          test -f build/package-check/my_game.app/Contents/Resources/assets/images/raylib_logo.png
          codesign --verify --deep --strict --verbose=2 \
            build/package-check/my_game.app

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: my_game-${{ matrix.os }}
          path: |
            build/my_game
            build/my_game.exe
            build/Release/my_game.exe
            build/assets/**
            build/Release/assets/**
            build/libEGL.*
            build/libGLESv2.*
            build/libvulkan.so.*
            build/d3dcompiler_47.dll
            build/Release/libEGL.*
            build/Release/libGLESv2.*
            build/Release/libvulkan.so.*
            build/Release/d3dcompiler_47.dll
            build/my_game-macos.zip
            build/angle-licenses/**
            build/Release/angle-licenses/**
          if-no-files-found: ignore

  build-web:
    name: Build WebAssembly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@667eb33f24e84e7f362c16d8d7fff0629a73e15e # v15
        with:
          version: 5.0.3
          actions-cache-folder: emsdk-cache

      - name: Configure CMake
        run: emcmake cmake -B build/web -DPLATFORM=Web -DRL_ALIAS_MODE="INLINE" -DRAYLIB_ALIAS_PREFIX="RLIB_" -DRLGL_ALIAS_PREFIX="RLGL_"

      - name: Build
        run: cmake --build build/web --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: my_game-web
          path: |
            build/web/my_game.html
            build/web/my_game.js
            build/web/my_game.wasm
            build/web/my_game.data
          if-no-files-found: error

  release:
    name: Publish Latest Release
    runs-on: ubuntu-latest
    needs: [build, build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Move latest tag to current commit
        run: |
          git tag -f latest "${{ github.sha }}"
          git push origin refs/tags/latest --force

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --repo "$GITHUB_REPOSITORY" || true

      - name: Prepare release files
        run: |
          mkdir -p release
          test -f artifacts/my_game-ubuntu-latest/assets/images/raylib_logo.png
          test -f artifacts/my_game-windows-latest/Release/assets/images/raylib_logo.png
          test -f artifacts/my_game-web/my_game.data
          chmod +x artifacts/my_game-ubuntu-latest/my_game
          tar -C artifacts/my_game-ubuntu-latest -czf release/my_game-linux.tar.gz .
          cp artifacts/my_game-macos-latest/my_game-macos.zip release/my_game-macos.zip
          (cd artifacts/my_game-windows-latest && zip -r ../../release/my_game-windows.zip .)
          if [ -d artifacts/my_game-web ]; then
            (cd artifacts/my_game-web && zip -r ../../release/my_game-web.zip .)
          fi

      - name: Update latest release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automatic build from the latest commit on main branch.

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}
          files: release/*
          prerelease: false
          draft: false

  release-version:
    name: Publish Versioned Release
    runs-on: ubuntu-latest
    needs: [build, build-web]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          test -f artifacts/my_game-ubuntu-latest/assets/images/raylib_logo.png
          test -f artifacts/my_game-windows-latest/Release/assets/images/raylib_logo.png
          test -f artifacts/my_game-web/my_game.data
          chmod +x artifacts/my_game-ubuntu-latest/my_game
          tar -C artifacts/my_game-ubuntu-latest -czf "release/my_game-linux-${{ github.ref_name }}.tar.gz" .
          cp artifacts/my_game-macos-latest/my_game-macos.zip \
            "release/my_game-macos-${{ github.ref_name }}.zip"
          (cd artifacts/my_game-windows-latest && zip -r "../../release/my_game-windows-${{ github.ref_name }}.zip" .)
          if [ -d artifacts/my_game-web ]; then
            (cd artifacts/my_game-web && zip -r "../../release/my_game-web-${{ github.ref_name }}.zip" .)
          fi

      - name: Create versioned release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}.

            **Commit:** ${{ github.sha }}
          files: release/*
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          draft: false
