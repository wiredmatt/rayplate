name: Build

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y build-essential cmake git libgl1-mesa-dev libwayland-bin libwayland-dev libx11-dev libxcursor-dev libxext-dev libxi-dev libxinerama-dev libxrandr-dev libxkbcommon-dev mesa-vulkan-drivers pkg-config xauth xvfb
            cmake_args: -DRAYPLATE_ANGLE_PROVIDER=DOWNLOAD
          - os: macos-latest
            install_deps: ''
            cmake_args: -DRAYPLATE_ANGLE_PROVIDER=DOWNLOAD
          - os: windows-latest
            install_deps: ''
            cmake_args: -DRAYPLATE_ANGLE_PROVIDER=DOWNLOAD

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        if: matrix.install_deps != ''
        run: ${{ matrix.install_deps }}

      - name: Configure CMake
        run: cmake -B build ${{ matrix.cmake_args }} -DRL_ALIAS_MODE="INLINE" -DRAYLIB_ALIAS_PREFIX="RLIB_" -DRLGL_ALIAS_PREFIX="RLGL_"

      - name: Build
        run: cmake --build build --config Release

      - name: Verify Linux resolves rlgl through ANGLE
        if: runner.os == 'Linux'
        run: |
          readelf -d build/my_game | grep 'Shared library: \[libGLESv2.so\]'
          test -f build/libvulkan.so.1

      - name: Smoke test Linux ANGLE backends
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for api in opengl vulkan; do
            set +e
            timeout 15s xvfb-run -a stdbuf -oL -eL \
              build/my_game --graphics-api="$api" >"$api.log" 2>&1
            status=$?
            set -e
            cat "$api.log"
            if [[ "$status" -ne 124 ]]; then
              exit 1
            fi
            grep 'DISPLAY: Device initialized successfully' "$api.log"
            grep "ANGLE: Requested backend:" "$api.log"
          done

      - name: Verify macOS resolves rlgl through ANGLE
        if: runner.os == 'macOS'
        run: |
          otool -L build/my_game | grep '@loader_path/libGLESv2.dylib'

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: my_game-${{ matrix.os }}
          path: |
            build/my_game
            build/my_game.exe
            build/Release/my_game.exe
            build/libEGL.*
            build/libGLESv2.*
            build/libvulkan.so.*
            build/d3dcompiler_47.dll
            build/Release/libEGL.*
            build/Release/libGLESv2.*
            build/Release/libvulkan.so.*
            build/Release/d3dcompiler_47.dll
            build/angle-licenses/**
            build/Release/angle-licenses/**
          if-no-files-found: ignore

  build-web:
    name: Build WebAssembly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@667eb33f24e84e7f362c16d8d7fff0629a73e15e # v15
        with:
          version: 5.0.3
          actions-cache-folder: emsdk-cache

      - name: Configure CMake
        run: emcmake cmake -B build/web -DPLATFORM=Web -DRL_ALIAS_MODE="INLINE" -DRAYLIB_ALIAS_PREFIX="RLIB_" -DRLGL_ALIAS_PREFIX="RLGL_"

      - name: Build
        run: cmake --build build/web --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: my_game-web
          path: |
            build/web/my_game.html
            build/web/my_game.js
            build/web/my_game.wasm
          if-no-files-found: error

  release:
    name: Publish Latest Release
    runs-on: ubuntu-latest
    needs: [build, build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Move latest tag to current commit
        run: |
          git tag -f latest "${{ github.sha }}"
          git push origin refs/tags/latest --force

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --repo "$GITHUB_REPOSITORY" || true

      - name: Prepare release files
        run: |
          mkdir -p release
          chmod +x artifacts/my_game-ubuntu-latest/my_game
          chmod +x artifacts/my_game-macos-latest/my_game
          tar -C artifacts/my_game-ubuntu-latest -czf release/my_game-linux.tar.gz .
          tar -C artifacts/my_game-macos-latest -czf release/my_game-macos.tar.gz .
          (cd artifacts/my_game-windows-latest && zip -r ../../release/my_game-windows.zip .)
          if [ -d artifacts/my_game-web ]; then
            (cd artifacts/my_game-web && zip -r ../../release/my_game-web.zip .)
          fi

      - name: Update latest release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automatic build from the latest commit on main branch.

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}
          files: release/*
          prerelease: false
          draft: false

  release-version:
    name: Publish Versioned Release
    runs-on: ubuntu-latest
    needs: [build, build-web]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          tar -C artifacts/my_game-ubuntu-latest -czf "release/my_game-linux-${{ github.ref_name }}.tar.gz" .
          tar -C artifacts/my_game-macos-latest -czf "release/my_game-macos-${{ github.ref_name }}.tar.gz" .
          (cd artifacts/my_game-windows-latest && zip -r "../../release/my_game-windows-${{ github.ref_name }}.zip" .)
          if [ -d artifacts/my_game-web ]; then
            (cd artifacts/my_game-web && zip -r "../../release/my_game-web-${{ github.ref_name }}.zip" .)
          fi

      - name: Create versioned release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}.

            **Commit:** ${{ github.sha }}
          files: release/*
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          draft: false
