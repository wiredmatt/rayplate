name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y build-essential cmake git libgl1-mesa-dev libwayland-bin libwayland-dev libx11-dev libxcursor-dev libxext-dev libxi-dev libxinerama-dev libxrandr-dev libxkbcommon-dev pkg-config && (sudo apt-get install -y libsdl3-dev || sudo apt-get install -y libsdl2-dev)
            cmake_args: -DPLATFORM=SDL
          - os: macos-latest
            install_deps: brew install sdl3 pkg-config
            cmake_args: -DPLATFORM=SDL
          - os: windows-latest
            install_deps: '& "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install sdl3:x64-windows-static'
            cmake_args: -DPLATFORM=SDL -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        if: matrix.install_deps != ''
        run: ${{ matrix.install_deps }}

      - name: Configure CMake
        run: cmake -B build ${{ matrix.cmake_args }} -DRL_ALIAS_MODE="INLINE" -DRL_ALIAS_PREFIX="rl"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my_game-${{ matrix.os }}
          path: |
            build/my_game
            build/my_game.exe
            build/Release/my_game.exe
          if-no-files-found: ignore

  build-web:
    name: Build WebAssembly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.3
          actions-cache-folder: emsdk-cache

      - name: Configure CMake
        run: emcmake cmake -B build/web -DPLATFORM=Web -DRL_ALIAS_MODE="INLINE" -DRL_ALIAS_PREFIX="rl"

      - name: Build
        run: cmake --build build/web --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my_game-web
          path: |
            build/web/my_game.html
            build/web/my_game.js
            build/web/my_game.wasm
          if-no-files-found: error

  release:
    name: Publish Latest Release
    runs-on: ubuntu-latest
    needs: [build, build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move latest tag to current commit
        run: |
          git tag -f latest "${{ github.sha }}"
          git push origin refs/tags/latest --force

      - name: Prepare release files
        run: |
          mkdir -p release
          # Linux
          if [ -f artifacts/my_game-ubuntu-latest/my_game ]; then
            cp artifacts/my_game-ubuntu-latest/my_game release/my_game-linux
            chmod +x release/my_game-linux
          fi
          # macOS
          if [ -f artifacts/my_game-macos-latest/my_game ]; then
            cp artifacts/my_game-macos-latest/my_game release/my_game-macos
            chmod +x release/my_game-macos
          fi
          # Windows
          if [ -f artifacts/my_game-windows-latest/my_game.exe ]; then
            cp artifacts/my_game-windows-latest/my_game.exe release/my_game-windows.exe
          elif [ -f artifacts/my_game-windows-latest/Release/my_game.exe ]; then
            cp artifacts/my_game-windows-latest/Release/my_game.exe release/my_game-windows.exe
          fi
          # Web
          if [ -d artifacts/my_game-web ]; then
            (cd artifacts/my_game-web && zip -r ../../release/my_game-web.zip .)
          fi

      - name: Update latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automatic build from the latest commit on main branch.

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}
          files: release/*
          prerelease: false
          draft: false
