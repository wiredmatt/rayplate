name: Deploy web build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WebAssembly site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@667eb33f24e84e7f362c16d8d7fff0629a73e15e # v15
        with:
          version: 5.0.3
          actions-cache-folder: emsdk-cache

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Configure CMake
        run: >-
          emcmake cmake -S . -B build/web
          -DCMAKE_BUILD_TYPE=Release
          -DPLATFORM=Web
          -DRL_ALIAS_MODE=INLINE
          -DRAYLIB_ALIAS_PREFIX=RLIB_
          -DRLGL_ALIAS_PREFIX=RLGL_

      - name: Build
        run: cmake --build build/web --parallel

      - name: Prepare site
        run: |
          mkdir site
          cp build/web/my_game.html site/index.html
          cp build/web/my_game.js build/web/my_game.wasm build/web/my_game.data site/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
